name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          # Flyway 테스트 설정과 동일한 DB 이름으로 맞춘다.
          MYSQL_DATABASE: teampo
          TZ: Asia/Seoul
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create jwt-secret.yml from repository secret
        env:
          JWT_SECRET_YML_BASE64: ${{ secrets.JWT_SECRET_YML_BASE64 }}
        run: |
          test -n "$JWT_SECRET_YML_BASE64" || { echo "JWT_SECRET_YML_BASE64 is not set"; exit 1; }
          mkdir -p src/main/resources
          printf '%s' "$JWT_SECRET_YML_BASE64" | base64 --decode > src/main/resources/jwt-secret.yml

      # MySQL 포트가 실제로 열릴 때까지 한 번 더 대기
      # health check만으로 간헐 타이밍 이슈가 날 수 있어서 추가
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            (echo > /dev/tcp/127.0.0.1/3307) >/dev/null 2>&1 && exit 0
            sleep 2
          done
          echo "MySQL did not become ready in time."
          exit 1

      - name: Wait for Redis
        run: |
          for i in {1..30}; do
            (echo > /dev/tcp/127.0.0.1/6379) >/dev/null 2>&1 && exit 0
            sleep 2
          done
          echo "Redis did not become ready in time."
          exit 1

      - name: Build and test with Gradle
        env:
          RUN_DB_TESTS: true
        run: ./gradlew build
