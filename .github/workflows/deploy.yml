name: Deploy API

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-api
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY_URL: ${{ secrets.ECR_REPOSITORY_URL }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          ECR_REGISTRY="${ECR_REPOSITORY_URL%/*}"
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"

      - name: Build and push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag "${ECR_REPOSITORY_URL}:latest" \
            --tag "${ECR_REPOSITORY_URL}:${GITHUB_SHA}" \
            --push \
            .

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -eu

            ECR_REPOSITORY_URL="${{ secrets.ECR_REPOSITORY_URL }}"
            AWS_REGION="${{ secrets.AWS_REGION }}"
            ECR_REGISTRY="${ECR_REPOSITORY_URL%/*}"

            sudo docker network create teampo 2>/dev/null || true

            aws ecr get-login-password --region "$AWS_REGION" \
              | sudo docker login --username AWS --password-stdin "$ECR_REGISTRY"

            sudo docker pull "${ECR_REPOSITORY_URL}:latest"
            sudo docker rm -f teampo-api 2>/dev/null || true

            sudo docker run -d \
              --name teampo-api \
              --restart unless-stopped \
              --network teampo \
              --env-file /opt/teampo/api.env \
              -p 80:8080 \
              "${ECR_REPOSITORY_URL}:latest"

            sleep 10
            curl -fsS http://localhost/swagger-ui/index.html >/dev/null
            sudo docker ps --filter name=teampo-api
