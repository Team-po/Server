name: Deploy API

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-api
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY_URL: ${{ secrets.ECR_REPOSITORY_URL }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          ECR_REGISTRY="${ECR_REPOSITORY_URL%/*}"
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"

      - name: Build and push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag "${ECR_REPOSITORY_URL}:latest" \
            --tag "${ECR_REPOSITORY_URL}:${GITHUB_SHA}" \
            --push \
            .

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -eu

            ECR_REPOSITORY_URL="${{ secrets.ECR_REPOSITORY_URL }}"
            AWS_REGION="${{ secrets.AWS_REGION }}"
            CLOUDWATCH_LOG_GROUP_NAME="/aws/teampo/dev/api"
            ECR_REGISTRY="${ECR_REPOSITORY_URL%/*}"

            wait_for_http() {
              url="$1"
              for _ in $(seq 1 30); do
                if curl -fsS "$url" >/dev/null; then
                  return 0
                fi
                sleep 2
              done
              return 1
            }

            run_api_container() {
              image="$1"
              sudo docker run -d \
                --name teampo-api \
                --restart unless-stopped \
                --network teampo \
                --env-file /opt/teampo/api.env \
                --log-driver=awslogs \
                --log-opt awslogs-region="$AWS_REGION" \
                --log-opt awslogs-group="$CLOUDWATCH_LOG_GROUP_NAME" \
                --log-opt awslogs-stream=api \
                -p 80:8080 \
                "$image"
            }

            rollback_api() {
              if [ -n "$PREVIOUS_IMAGE_ID" ]; then
                sudo docker rm -f teampo-api 2>/dev/null || true
                run_api_container "$PREVIOUS_IMAGE_ID"
                wait_for_http http://localhost/swagger-ui/index.html
              fi
            }

            sudo test -r /opt/teampo/api.env
            sudo docker network create teampo 2>/dev/null || true

            aws ecr get-login-password --region "$AWS_REGION" \
              | sudo docker login --username AWS --password-stdin "$ECR_REGISTRY"

            PREVIOUS_IMAGE_ID="$(sudo docker inspect -f '{{.Image}}' teampo-api 2>/dev/null || true)"

            sudo docker pull "${ECR_REPOSITORY_URL}:latest"

            sudo docker rm -f teampo-api-candidate 2>/dev/null || true
            sudo docker run -d \
              --name teampo-api-candidate \
              --restart no \
              --network teampo \
              --env-file /opt/teampo/api.env \
              --log-driver=awslogs \
              --log-opt awslogs-region="$AWS_REGION" \
              --log-opt awslogs-group="$CLOUDWATCH_LOG_GROUP_NAME" \
              --log-opt awslogs-stream=api-candidate \
              -p 127.0.0.1:18080:8080 \
              "${ECR_REPOSITORY_URL}:latest"

            if ! wait_for_http http://127.0.0.1:18080/swagger-ui/index.html; then
              sudo docker ps -a --filter name=teampo-api-candidate
              sudo docker rm -f teampo-api-candidate 2>/dev/null || true
              exit 1
            fi

            sudo docker rm -f teampo-api-candidate
            sudo docker rm -f teampo-api 2>/dev/null || true

            if ! run_api_container "${ECR_REPOSITORY_URL}:latest"; then
              rollback_api
              exit 1
            fi

            if ! wait_for_http http://localhost/swagger-ui/index.html; then
              sudo docker ps -a --filter name=teampo-api
              rollback_api
              exit 1
            fi

            sudo docker ps --filter name=teampo-api
