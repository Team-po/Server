spring:
  config:
    activate:
      on-profile: local
    import:
      - optional:file:./config/jwt-secret.local.yml
      - optional:file:./config/s3-secret.local.yml
      - optional:file:./config/email-secret.yml

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/teampo?serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6380}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: ${MAIL_HOST:${email.host:smtp.gmail.com}}
    port: ${MAIL_PORT:${email.port:587}}
    username: ${MAIL_USERNAME:${email.username:}}
    password: ${MAIL_PASSWORD:${email.password:}}
    protocol: smtp
    auth-code-ttl: ${MAIL_AUTH_CODE_TTL:${email.auth-code-ttl:PT5M}}
    verified-ttl: ${MAIL_VERIFIED_TTL:${email.verified-ttl:PT10M}}
    auth-code-subject: ${MAIL_AUTH_CODE_SUBJECT:${email.auth-code-subject:TeamPo 이메일 인증번호}}

cloud:
  aws:
    credentials:
      access-key: ${S3_ACCESS_KEY:${local.s3.access-key}}
      secret-key: ${S3_SECRET_KEY:${local.s3.secret-key}}
    s3:
      bucket: ${S3_BUCKET:${local.s3.bucket:team-po}}
      endpoint: ${S3_ENDPOINT:${local.s3.endpoint:}}
      path-style-access-enabled: ${S3_PATH_STYLE_ACCESS_ENABLED:true}

jwt:
  secret: ${JWT_SECRET:${local.jwt.secret}}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:30m}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:14d}

logging:
  level:
    team.po: debug
