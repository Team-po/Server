spring:
  config:
    import:
      - optional:classpath:jwt-secret.yml
      - optional:classpath:s3-secret.yml
  jackson:
    # API 에서 내려가는 시간 직렬화 기준을 UTC 로 통일한다.
    time-zone: UTC
  datasource:
    # DB 연결 해석 기준도 UTC 로 맞춰 환경별 시간 차이를 줄인다.
    url: jdbc:mysql://localhost:3307/teampo?serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # JDBC 레벨에서 읽고 쓰는 시간을 UTC 기준으로 고정한다.
        jdbc.time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
cloud:
  aws:
    credentials:
      access-key: ${s3.access-key}
      secret-key: ${s3.secret-key}
    s3:
      bucket: team-po
      dir: images
      endpoint: ${s3.endpoint:}
      presigned-expiration: 5m
      max-upload-size-bytes: 5242880
      path-style-access-enabled: true
    region:
      static: ap-northeast-2
    stack:
      auto: false

logging:
  level:
    org.springframework: info
    team.po: debug

server:
  port: 8080
