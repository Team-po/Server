spring:
  config:
    import: optional:classpath:jwt-secret.yml
  datasource:
    url: jdbc:mysql://localhost:3307/teampo?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    org.springframework: info
    team.po: debug

server:
  port: 8080
