spring:
  config:
    import:
      - optional:file:./config/email-secret.yml

  jackson:
    # API 에서 내려가는 시간 직렬화 기준을 UTC 로 통일한다.
    time-zone: UTC
  datasource:
    # DB 연결 해석 기준도 UTC 로 맞춰 환경별 시간 차이를 줄인다.
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:false}
        # JDBC 레벨에서 읽고 쓰는 시간을 UTC 기준으로 고정한다.
        jdbc.time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:${email.host:smtp.gmail.com}}
    port: ${MAIL_PORT:${email.port:587}}
    username: ${MAIL_USERNAME:${email.username:}}
    password: ${MAIL_PASSWORD:${email.password:}}
    protocol: smtp
    auth-code-ttl: ${MAIL_AUTH_CODE_TTL:${email.auth-code-ttl:PT5M}}
    verified-ttl: ${MAIL_VERIFIED_TTL:${email.verified-ttl:PT10M}}
    auth-code-subject: ${MAIL_AUTH_CODE_SUBJECT:${email.auth-code-subject:TeamPo 이메일 인증번호}}

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET}
      dir: ${S3_DIR:images}
      endpoint: ${S3_ENDPOINT:}
      presigned-expiration: ${S3_PRESIGNED_EXPIRATION:5m}
      max-upload-size-bytes: ${S3_MAX_UPLOAD_SIZE_BYTES:5242880}
      path-style-access-enabled: ${S3_PATH_STYLE_ACCESS_ENABLED:false}
    region:
      static: ${AWS_REGION:ap-northeast-2}
    stack:
      auto: false

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:30m}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:14d}

logging:
  level:
    org.springframework: info
    team.po: ${APP_LOG_LEVEL:info}

server:
  port: ${SERVER_PORT:8080}
