<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="x-apple-disable-message-reformatting" />
		<title>Team-po 이메일 인증</title>
		<style>
			body,
			table,
			td,
			a {
				-webkit-text-size-adjust: 100%;
				-ms-text-size-adjust: 100%;
			}

			table {
				border-collapse: collapse;
			}

			body {
				width: 100%;
				min-width: 100%;
				margin: 0;
				padding: 0;
				background-color: #f8fafc;
			}

			img {
				-ms-interpolation-mode: bicubic;
				border: 0;
				outline: none;
				text-decoration: none;
			}

			a {
				color: #2563eb;
				text-decoration: none;
			}

			.preheader {
				display: none;
				visibility: hidden;
				opacity: 0;
				color: transparent;
				height: 0;
				width: 0;
				overflow: hidden;
			}
		</style>
	</head>
	<body style="margin: 0; padding: 0; background-color: #f8fafc">
		<div class="preheader">
			Team-po 이메일 인증번호입니다. 인증번호는 5분간 유효합니다.
		</div>

		<table
			role="presentation"
			width="100%"
			cellspacing="0"
			cellpadding="0"
			border="0"
			style="width: 100%; background-color: #f8fafc"
		>
			<tr>
				<td
					align="center"
					class="outer-padding"
					style="padding: 40px 20px"
				>
					<table
						role="presentation"
						width="100%"
						cellspacing="0"
						cellpadding="0"
						border="0"
						class="shell"
						style="width: 100%; max-width: 600px"
					>
						<tr>
							<td
								class="card-padding"
								style="
									padding: 40px;
									background-color: #ffffff;
									border: 1px solid #e2e8f0;
									border-radius: 16px;
									box-shadow: 0 10px 25px rgba(14, 31, 53, 0.1);
								"
							>
								<table
									role="presentation"
									width="100%"
									cellspacing="0"
									cellpadding="0"
									border="0"
								>
									<tr>
										<td>
											<div
												style="
													display: inline-block;
													padding: 7px 11px;
													background-color: #eff6ff;
													border: 1px solid #bfdbfe;
													border-radius: 999px;
													color: #2563eb;
													font-family: Arial, Helvetica, sans-serif;
													font-size: 12px;
													font-weight: 800;
													line-height: 16px;
												"
											>
												회원가입 인증
											</div>
										</td>
									</tr>

									<tr>
										<td style="padding-top: 22px">
											<h1
												class="title"
												style="
													margin: 0;
													color: #0f172a;
													font-family: Arial, Helvetica, sans-serif;
													font-size: 32px;
													font-weight: 800;
													letter-spacing: -0.02em;
													line-height: 40px;
												"
											>
												이메일 인증번호를 확인해 주세요
											</h1>
										</td>
									</tr>

									<tr>
										<td style="padding-top: 14px">
											<p
												style="
													margin: 0;
													color: #475569;
													font-family: Arial, Helvetica, sans-serif;
													font-size: 15px;
													line-height: 24px;
												"
											>
												Team-po 계정 생성을 완료하려면 아래 인증번호를 인증
												화면에 입력해 주세요. 인증번호는 발급 후 5분간만
												유효합니다.
											</p>
										</td>
									</tr>

									<tr>
										<td style="padding-top: 28px">
											<table
												role="presentation"
												width="100%"
												cellspacing="0"
												cellpadding="0"
												border="0"
												style="
													width: 100%;
													background-color: #f1f5f9;
													border: 1px solid #dbeafe;
													border-radius: 14px;
												"
											>
												<tr>
													<td
														align="center"
														style="padding: 26px 18px 24px"
													>
														<div
															style="
																color: #64748b;
																font-family: Arial, Helvetica, sans-serif;
																font-size: 12px;
																font-weight: 800;
																letter-spacing: 0.12em;
																line-height: 16px;
																text-transform: uppercase;
															"
														>
															인증번호
														</div>
														<div
															class="code"
															style="
																margin-top: 10px;
																color: #2563eb;
																font-family: 'Courier New', Courier, monospace;
																font-size: 44px;
																font-weight: 700;
																letter-spacing: 8px;
																line-height: 52px;
															"
														>
															__VERIFICATION_CODE__
														</div>
													</td>
												</tr>
											</table>
										</td>
									</tr>

									<tr>
										<td style="padding-top: 22px">
											<table
												role="presentation"
												width="100%"
												cellspacing="0"
												cellpadding="0"
												border="0"
												style="
													width: 100%;
													background-color: #fff7ed;
													border: 1px solid #fed7aa;
													border-radius: 12px;
												"
											>
												<tr>
													<td style="padding: 16px 18px">
														<p
															style="
																margin: 0;
																color: #9a3412;
																font-family: Arial, Helvetica, sans-serif;
																font-size: 13px;
																font-weight: 700;
																line-height: 20px;
															"
														>
															요청하지 않은 인증 메일이라면 이 메일을 무시해도
															됩니다. 인증번호는 절대 다른 사람에게 공유하지 마세요.
														</p>
													</td>
												</tr>
											</table>
										</td>
									</tr>
								</table>
							</td>
						</tr>

						<tr>
							<td align="center" style="padding: 22px 12px 0">
								<p
									style="
										margin: 0;
										color: #64748b;
										font-family: Arial, Helvetica, sans-serif;
										font-size: 12px;
										line-height: 19px;
									"
								>
									이 메일은 Team-po 이메일 인증을 위해 자동 발송되었습니다.<br />
									&copy; Team-po. All rights reserved.
								</p>
							</td>
						</tr>
					</table>
				</td>
			</tr>
		</table>
	</body>
</html>
