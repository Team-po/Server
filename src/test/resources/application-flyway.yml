spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/teampo?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: test-github-client-id
            client-secret: test-github-client-secret
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - read:user
              - user:email

cloud:
  aws:
    s3:
      bucket: test-bucket
    region:
      static: ap-northeast-2

jwt:
  secret: YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
  access-token-expiration: 30m
  refresh-token-expiration: 14d

github:
  oauth:
    success-redirect-uri: http://localhost:5173/oauth/github/callback
    authorization-code-ttl: PT3M
