spring:
  datasource:
    url: jdbc:h2:mem:teampo;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: test-github-client-id
            client-secret: test-github-client-secret
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - read:user
              - user:email

cloud:
  aws:
    s3:
      bucket: test-bucket
    region:
      static: ap-northeast-2

jwt:
  secret: YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
  access-token-expiration: 30m
  refresh-token-expiration: 14d

github:
  oauth:
    success-redirect-uri: http://localhost:5173/oauth/github/callback
    authorization-code-ttl: PT3M
    token-encryption-secret: YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
